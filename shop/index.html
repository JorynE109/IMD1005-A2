<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Morgan's Magic Emporium</title>
    <link rel="icon" type="image/x-icon" href="../img/favicon.ico">
    <link rel="stylesheet" href="https://meyerweb.com/eric/tools/css/reset/reset.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Italiana&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/shop.css">
</head>
<body>
    <header>
        <nav>
            <div id="navIconHolder">
                <a href="/" id="logo"><img src="/img/logo.svg"></a>
                <a href="#" id="cart"><img src="/img/cart.svg"></a>
                <a href="#" id="hamburger"><img src="/img/hamburger.svg"></a>
            </div>
            <div id="mobileShrink">
                <a href="#">Shop</a>
                <a href="#">About</a>
                <a href="/contact/">Contact</a>
            </div>
        </nav>
    </header>
    <button onclick="topFunction()" id="topBtn" title="Go to top">Top</button>
    <div id="wrapper">
        <main>
            <div class="border-image-left"></div>
            <div class="border-image-right"></div>
            <section id="titles">    
                <h1>Shop</h1>
                <p>Browse all my wares</p>
            </section>
            <div id="searchBarHolder">
                <form>
                    <input type="text" id="search">
                    <button type="submit">Search</button>
                </form>
            </div>
            <div id="productSelection">
                <button onclick="toggleButtons()" class="productSelectCategory" id="productSelectedDefaultButton">All</button>
                <button onclick="productSelected('all')" class="productSelectCategory" data-category="all">All</button>
                <button onclick="productSelected('potions')" class="productSelectCategory" data-category="potions">Potions</button>
                <button onclick="productSelected('artifacts')" class="productSelectCategory" data-category="artifacts">Artifacts</button>
                <button onclick="productSelected('books')" class="productSelectCategory" data-category="books">Books</button>
                <button onclick="productSelected('spells')" class="productSelectCategory" data-category="spells">Spells</button>
            </div>

            <section id="gallery">
            </section>
        </main>
        <div class="blur-footer-reveal"></div>
        <footer>
            <a href="../">Home</a>
            <a href="#">Shop</a>
            <a href="#">About</a>
            <a href="../contact/">Contact</a>
            <a href="#">Policies</a>
        </footer>
    </div>
    <script src="/js/main.js"></script>
    <script src="/js/shop.js"></script>

</body>
</html>
